<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">

    <title>مشغل البث المباشر</title>
    <style>
        /* تحويل الصفحة لمشغل فقط بدون هوامش */
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط التحكم العلوي للمشغل */
        .player-header {
            background-color: #111;
            border-bottom: 2px solid #222;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .admin-btn {
            background-color: #f39c12;
            color: #000;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap; 
        }

        /* توحيد كل زراير التحكم العلوية */
        .nav-btn, .rotate-btn, .adblock-btn, .close-top-btn, .external-top-btn, .copy-top-btn {
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        /* ألوان الزراير المتخصصة */
        .nav-btn { background-color: #3498db; }
        .nav-btn:hover { background-color: #2980b9; }

        .rotate-btn { background-color: #9b59b6; }
        .rotate-btn:hover { background-color: #8e44ad; }

        .close-top-btn { background-color: #c0392b; }
        .close-top-btn:hover { background-color: #e74c3c; }

        .external-top-btn { background-color: #8e44ad; }
        .external-top-btn:hover { background-color: #9b59b6; }

        /* زرار النسخ الجديد */
        .copy-top-btn { background-color: #f39c12; color: #000; }
        .copy-top-btn:hover { background-color: #e67e22; color: white; }

        .adblock-btn { background-color: #27ae60; }
        .adblock-btn.disabled { background-color: #c0392b; }

        /* شريط القنوات قابل للتمرير */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
        }
        
        .tabs-container::-webkit-scrollbar { height: 6px; }
        .tabs-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .tab-btn {
            background-color: #008b8b;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .tab-btn.active {
            background-color: #004d4d;
            border: 1px solid #fff;
        }

        /* تعديل الفيديو */
        .video-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1;
            background-color: #000;
        }

        .video-wrapper.rotated iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: calc(100vh - 75px);
            height: 100vw;
            transform: translate(-50%, -50%) rotate(90deg);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* لوحة التعديل */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #444;
            color: white;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 14px;}
        .form-group input, .form-group select {
            width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #555;
            background-color: #333; color: white; box-sizing: border-box;
        }

        .modal-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        
        .save-btn { background-color: #27ae60; } 
        .delete-btn { background-color: #e74c3c; } 
        .close-btn { background-color: #7f8c8d; } 
        
        .export-section {
            border-top: 1px solid #444;
            padding-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-channel-btn { background-color: #d35400; color: white; width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .download-btn { background-color: #2980b9; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .copy-btn { background-color: #8e44ad; color: white; flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* تنسيقات زرار الاكتشاف الجديد اللي ضفناها */
        .tools-container {
            display: flex;
            justify-content: center;
            padding: 5px 0;
        }

        .auto-fetch-btn {
            background-color: #e67e22; 
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); 
        }

        .auto-fetch-btn:hover {
            background-color: #d35400; 
        }

        .auto-fetch-btn:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>

    <script>
        function populateSelectMenu() {
            const selectMenu = document.getElementById('buttonSelect');
            selectMenu.innerHTML = ''; 
            document.querySelectorAll('#mainTabs .tab-btn').forEach(btn => {
                let opt = document.createElement('option');
                opt.value = btn.id;
                opt.innerText = btn.innerText;
                selectMenu.appendChild(opt);
            });
        }
        populateSelectMenu();

        window.onload = function() {
            let firstBtn = document.querySelector('#mainTabs .tab-btn');
            if(firstBtn) playStream(firstBtn);
            populateSelectMenu();
        };

        let adblockEnabled = true;
        function toggleAdBlock() {
            let iframe = document.getElementById('videoPlayer');
            let btn = document.getElementById('adblockBtn');
            adblockEnabled = !adblockEnabled;
            
            if (adblockEnabled) {
                iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
                btn.innerText = '🛡️ المانع (شغال)';
                btn.classList.remove('disabled');
            } else {
                iframe.removeAttribute('sandbox');
                btn.innerText = '🛡️ المانع (مقفول)';
                btn.classList.add('disabled');
            }
            
            let currentSrc = iframe.src;
            if(currentSrc && currentSrc !== window.location.href) iframe.src = currentSrc;
        }

        function playStream(btnElement) {
            let link = btnElement.getAttribute('data-link');
            document.getElementById('videoPlayer').src = link;
            document.getElementById('closeVid').style.display = 'inline-block';
            document.getElementById('externalVid').style.display = 'inline-block';
            document.getElementById('copyLinkBtn').style.display = 'inline-block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function closePlayer() {
            document.getElementById('videoPlayer').src = "";
            document.getElementById('closeVid').style.display = 'none';
            document.getElementById('externalVid').style.display = 'none';
            document.getElementById('copyLinkBtn').style.display = 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        }

        function openExternal() {
            let currentLink = document.getElementById('videoPlayer').src;
            if (currentLink && currentLink.trim() !== "" && currentLink !== window.location.href) {
                window.open(currentLink, '_blank'); 
            } else {
                alert("مفيش بث شغال حالياً!");
            }
        }

        function copyCurrentLink() {
            let currentLink = document.getElementById('videoPlayer').src;
            if (currentLink && currentLink.trim() !== "" && currentLink !== window.location.href) {
                let textArea = document.createElement("textarea");
                textArea.value = currentLink;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert("تم نسخ رابط القناة بنجاح!");
            }
        }

        function openModal() {
            populateSelectMenu(); 
            document.getElementById('settingsModal').style.display = 'flex';
            loadButtonData();
        }

        function closeModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        function loadButtonData() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            if(btn) {
                document.getElementById('editName').value = btn.innerText;
                document.getElementById('editLink').value = btn.getAttribute('data-link');
            }
        }

        function applyChanges() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            if(!btn) return;
            btn.innerText = document.getElementById('editName').value;
            btn.setAttribute('data-link', document.getElementById('editLink').value);
            populateSelectMenu();
            if (btn.classList.contains('active')) playStream(btn);
            alert("تم التعديل!");
        }

        function deleteChannel() {
            let id = document.getElementById('buttonSelect').value;
            let btn = document.getElementById(id);
            if(btn && confirm("حذف القناة؟")) {
                if(btn.classList.contains('active')) closePlayer();
                btn.remove();
                populateSelectMenu();
                alert("تم الحذف!");
            }
        }

        function addNewChannel() {
            let inputLinks = prompt("حط اللينكات هنا:");
            if (!inputLinks) return;
            let linksArray = inputLinks.split(/[\s,\n]+/).filter(l => l.trim() !== "");
            let baseName = prompt("الاسم الأساسي:", "قناة");
            let timestamp = new Date().getTime();
            linksArray.forEach((link, index) => {
                let newBtn = document.createElement("button");
                newBtn.id = "btn_new_" + timestamp + "_" + index;
                newBtn.className = "tab-btn";
                newBtn.setAttribute("data-link", link);
                newBtn.innerText = linksArray.length > 1 ? `${baseName} ${index + 1}` : baseName;
                newBtn.setAttribute("onclick", "playStream(this)");
                document.getElementById("mainTabs").appendChild(newBtn);
            });
            populateSelectMenu();
        }

        function downloadFullFile() {
            closeModal(); 
            let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            let blob = new Blob([content], { type: 'text/html' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_player.html';
            a.click();
        }

        // --- الدالة المعدلة اللي كانت بايظة عندك ---
        function copyFullCode() {
            closeModal();
            let content = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            
            // إنشاء عنصر نصي وهمي للنسخ لضمان العمل على كل المتصفحات والأنظمة
            let textArea = document.createElement("textarea");
            textArea.value = content;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                let successful = document.execCommand('copy');
                if(successful) alert("تم نسخ الكود بالكامل بنجاح! ✅");
            } catch (err) {
                alert("عذراً، المتصفح رفض النسخ التلقائي.");
            }
            document.body.removeChild(textArea);
        }

        function nextStream() {
            let tabs = Array.from(document.querySelectorAll('#mainTabs .tab-btn'));
            let activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
            let nextIndex = (activeIndex + 1) % tabs.length; 
            playStream(tabs[nextIndex]);
            tabs[nextIndex].scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function prevStream() {
            let tabs = Array.from(document.querySelectorAll('#mainTabs .tab-btn'));
            let activeIndex = tabs.findIndex(btn => btn.classList.contains('active'));
            let prevIndex = (activeIndex - 1 + tabs.length) % tabs.length; 
            playStream(tabs[prevIndex]);
            tabs[prevIndex].scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function toggleRotation() {
            document.querySelector('.video-wrapper').classList.toggle('rotated');
        }

        function playRandomSportsChannel() {
            const sportsChannels = [
                { name: "Aflam4You Sport", url: "https://live.aflam4you.net/zremb472.php?vid=5407&aflam_s=1&aflam_w=360&aflam_h=250&aflam_k=11623324" },
                { name: "Koora Plus 1", url: "https://tv19.koora-plus.top/chtv/ch1.php" },
                { name: "Koora Plus 2", url: "https://tv19.koora-plus.top/chtv/ch2.php" },
                { name: "Koora Plus 3", url: "https://tv19.koora-plus.top/chtv/ch3.php" },
                { name: "Koora Plus 4", url: "https://tv19.koora-plus.top/chtv/ch4.php" }
            ];
            let existingLinks = Array.from(document.querySelectorAll('#mainTabs .tab-btn')).map(btn => btn.getAttribute('data-link'));
            let availableChannels = sportsChannels.filter(channel => !existingLinks.includes(channel.url));
            if (availableChannels.length === 0) {
                alert("كل القنوات المتاحة اتضافت قبل كده!");
                return;
            }
            const btn = document.getElementById('autoFetchBtn');
            btn.innerHTML = "⏳ جاري البحث...";
            setTimeout(() => {
                const randomChannel = availableChannels[Math.floor(Math.random() * availableChannels.length)];
                let newBtn = document.createElement("button");
                newBtn.id = "btn_auto_" + new Date().getTime();
                newBtn.className = "tab-btn";
                newBtn.setAttribute("data-link", randomChannel.url);
                newBtn.innerText = "⭐ " + randomChannel.name; 
                newBtn.setAttribute("onclick", "playStream(this)");
                document.getElementById("mainTabs").appendChild(newBtn);
                populateSelectMenu();
                playStream(newBtn);
                newBtn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                btn.innerHTML = "⚽ اكتشاف قناة رياضية من النت";
            }, 500); 
        }
    </script>
